{% extends "base.html" %} {% block content %}
<article class="page" lang="{{ page.lang | default(value="en") }}">
  <h1>{{ page.title }}</h1>
  {% if page.description %}
  <p class="lead">{{ page.description }}</p>
  {% endif %}
  <section class="content">{{ content | safe }}</section>
</article>
{% endblock content %}
